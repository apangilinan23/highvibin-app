<main class="login-page">
	<section class="auth-shell">
		<article class="brand-panel">
			<div class="brand-dot"></div>
			<div class="profile-header">
				<div class="logo-circle" aria-hidden="true">
					<span class="logo-word">
						<span class="warm">high</span>
						<span class="cool">vibin</span>
					</span>
					<span class="logo-sub">.ph</span>
				</div>
				<div class="brand-copy">
					<h1>High Vibin .ph</h1>
					<p class="meta">By Yuthika</p>
					<p class="bio">Let's Vibe High! Creating crystal-inspired crafts with positive energy.</p>
				</div>
			</div>
		</article>

		<article class="login-card">
			<h2>Member Login</h2>
			<p class="subtitle">Sign in to continue to your High Vibin account.</p>

			<form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
				<label for="email">Email</label>
				<input
					id="email"
					name="email"
					type="email"
					[(ngModel)]="email"
					autocomplete="email"
					placeholder="name@example.com"
					required
				/>

				<label for="password">Password</label>
				<input
					id="password"
					name="password"
					type="password"
					[(ngModel)]="password"
					autocomplete="current-password"
					placeholder="Enter password"
					required
				/>

				<button type="submit">Log In</button>
			</form>

			@if (message) {
				<p class="message">{{ message }}</p>
			}
		</article>
	</section>
</main>
