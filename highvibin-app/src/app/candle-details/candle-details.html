<main class="details-page">
  <header class="top-row">
    <nav class="crumbs" aria-label="Breadcrumb">
      <a routerLink="/candles" queryParamsHandling="preserve">Candles</a>
      <span>/</span>
      @if (candle$ | async; as candle) {
        <span>{{ candle.name }}</span>
      } @else {
        <span>Details</span>
      }
    </nav>
  </header>

  @if (candle$ | async; as candle) {
    <section class="details-card">
      <div class="media" [style.background]="candle.gradient">
        <img [src]="candle.image" [alt]="candle.name + ' sample image'" />
      </div>

      <article class="info">
        <h1>{{ candle.name }}</h1>
        <p class="price">{{ candle.price }}</p>
        <p class="scent">{{ candle.scent }}</p>

        <a class="back-btn" routerLink="/candles" queryParamsHandling="preserve">Back to Candle List</a>
      </article>
    </section>
  } @else {
    <section class="not-found">
      <h1>Candle not found</h1>
      <a class="back-btn" routerLink="/candles" queryParamsHandling="preserve">Back to Candle List</a>
    </section>
  }
</main>
